version: "3.9"

services:

  django:
    image: fadwaadocker4/netdevops-django:latest
    container_name: netdevops_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - monitoring

  postgres:
    image: postgres:15
    container_name: netdevops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netdevops_db
      POSTGRES_USER: netdevops_admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring

  redis:
    image: redis:7
    container_name: netdevops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - monitoring

volumes:
  postgres_data:

networks:
  monitoring:
    external: true
